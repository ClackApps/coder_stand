<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8' />
    <meta name='viewport' content='width=device-width, user-scalable=no' />
    <script src="coi-serviceworker.min.js"></script>
    <script type="text/javascript" src="pako_inflate.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }

        #canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #logo-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #logo {
            width: 60%;
            height: auto;
            display: block;
        }

        .spinner {
            margin-top: 20px;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.2);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
<div id="logo-container">
    <img id="logo" src="logo.png" alt="Logo">
    <div class="spinner"></div>
</div>

<canvas id="canvas"></canvas>

<script src="index.js"></script>
<script>
    const enginedata = "index";
    const gamedata = "index.pck";
    const engine = new Engine();

    async function loadAndInit() {
        try {
            Promise.all([
                engine.preloadFile(gamedata),
                engine.init(enginedata)
            ]).then(() => {
                return engine.start({ args: ['--main-pack', gamedata], focusCanvas: true });
            }).then(() => {
                document.getElementById('logo-container').style.display = 'none';
                console.log("Godot Engine has started!");
            });
        } catch (error) {
            console.error(error);
        }
    }

    loadAndInit();
</script>
</body>
</html>
